# ═══════════════════════════════════════════════════════════════
# ProjectForge 3D — Render Blueprint
# Django + Daphne + Channels + Redis + PostgreSQL
# ═══════════════════════════════════════════════════════════════

services:

  # ─── Django Web Service (ASGI Daphne) ────────────────────────
  - type: web
    name: projectforge-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    branch: main
    autoDeploy: true

    healthCheckPath: /api/health/

    envVars:

      # Django
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production

      - key: SECRET_KEY
        generateValue: true

      # PostgreSQL
      - key: DATABASE_URL
        fromDatabase:
          name: projectforge-db
          property: connectionString

      # Redis (Django Channels / WebSockets)
      - key: REDIS_URL
        fromService:
          type: redis
          name: projectforge-redis
          property: connectionString


      # Hosts
      - key: ALLOWED_HOSTS
        value: "projectforge-web.onrender.com,localhost,127.0.0.1"


      # CORS
      - key: CORS_ALLOWED_ORIGINS
        value: "https://projectforge-web.onrender.com"


      # Email SMTP
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend

      - key: EMAIL_HOST
        value: smtp.gmail.com

      - key: EMAIL_PORT
        value: "587"

      - key: EMAIL_USE_TLS
        value: "True"

      - key: EMAIL_HOST_USER
        sync: false

      - key: EMAIL_HOST_PASSWORD
        sync: false


      # JWT
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"

      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"


# ─── Redis para WebSockets ─────────────────────────────────────

  - type: redis
    name: projectforge-redis
    plan: free
    region: oregon


# ─── PostgreSQL ────────────────────────────────────────────────

databases:

  - name: projectforge-db
    plan: free
    region: oregon
    databaseName: projectforge_db
    user: projectforge