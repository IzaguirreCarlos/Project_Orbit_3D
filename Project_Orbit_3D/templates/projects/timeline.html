{% extends "base.html" %}
{% block title %}Timeline — {{ project.name }}{% endblock %}

{% block content %}
<div class="p-6">
  <div class="flex items-center gap-4 mb-6 animate-in">
    <a href="{% url 'projects:detail' project.id %}" class="text-white/40 hover:text-white transition-all">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </a>
    <div>
      <h1 class="text-xl font-bold text-white">Timeline — {{ project.name }}</h1>
      <p class="text-white/40 text-sm">Vista Gantt</p>
    </div>
  </div>

  <div class="glass rounded-2xl p-6 animate-in">
    <div id="timeline-container" class="overflow-x-auto">
      <p class="text-white/40 text-sm text-center py-10">Cargando timeline...</p>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const PROJECT_ID = '{{ project.id }}';

async function loadTimeline() {
  const res = await fetch(`/api/v1/tasks/?project=${PROJECT_ID}&ordering=deadline&page_size=100`);
  const data = await res.json();
  const tasks = data.results || data;

  if (!tasks.length) {
    document.getElementById('timeline-container').innerHTML = '<p class="text-white/30 text-center py-10">No hay tareas con fechas definidas</p>';
    return;
  }

  const withDeadline = tasks.filter(t => t.deadline);
  if (!withDeadline.length) {
    document.getElementById('timeline-container').innerHTML = '<p class="text-white/30 text-center py-10">Las tareas no tienen fechas límite asignadas</p>';
    return;
  }

  // Build simple Gantt-like timeline
  const dates = withDeadline.map(t => new Date(t.deadline));
  const minDate = new Date(Math.min(...dates));
  const maxDate = new Date(Math.max(...dates));
  const totalDays = Math.ceil((maxDate - minDate) / 86400000) + 7;

  const STATUS_COLORS = {
    done: '#22c55e', in_progress: '#6366f1',
    review: '#8b5cf6', testing: '#06b6d4',
    todo: '#64748b', backlog: '#374151'
  };

  let html = `
    <div style="min-width: ${Math.max(800, totalDays * 28)}px">
      <div class="flex mb-2 sticky top-0 z-10" style="background:rgba(15,15,26,0.9)">
        <div class="w-48 flex-shrink-0 text-xs text-white/40 font-medium px-2 py-2">Tarea</div>
        <div class="flex-1 relative h-8">
  `;

  // Day headers
  for (let i = 0; i <= totalDays; i += 3) {
    const d = new Date(minDate.getTime() + i * 86400000);
    const left = (i / totalDays) * 100;
    html += `<span class="absolute text-xs text-white/30 transform -translate-x-1/2" style="left:${left}%">
      ${d.toLocaleDateString('es',{month:'short',day:'numeric'})}
    </span>`;
  }
  html += `</div></div>`;

  // Task rows
  withDeadline.forEach(task => {
    const daysFromStart = Math.ceil((new Date(task.deadline) - minDate) / 86400000);
    const position = Math.max(0, (daysFromStart / totalDays) * 100);
    const color = STATUS_COLORS[task.status] || '#6366f1';
    html += `
      <div class="flex items-center gap-2 mb-2 group">
        <div class="w-48 flex-shrink-0 truncate text-sm text-white/70 px-2 group-hover:text-white transition-all" title="${task.title}">
          ${task.title}
        </div>
        <div class="flex-1 relative h-8">
          <div class="absolute inset-y-0 w-full" style="background:rgba(255,255,255,0.02); border-radius:4px;"></div>
          <div class="absolute top-1 h-6 rounded-lg px-2 flex items-center text-xs font-medium text-white whitespace-nowrap"
               style="left:${Math.max(0, position - 5)}%; background:${color}33; border:1px solid ${color}88; min-width:60px;">
            ${task.status.replace('_',' ')}
          </div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  document.getElementById('timeline-container').innerHTML = html;
  lucide.createIcons();
}

loadTimeline();
</script>
{% endblock %}
