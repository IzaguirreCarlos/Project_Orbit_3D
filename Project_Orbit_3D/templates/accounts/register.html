{% extends "base.html" %}
{% block auth_content %}
<div class="min-h-screen flex items-center justify-center p-8"
     style="background: radial-gradient(ellipse at top left, #1a0a3e 0%, #0f0f1a 50%, #0a1628 100%);">
  <div class="w-full max-w-lg">
    <div class="glass rounded-3xl p-8">
      <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4"
             style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
          <span class="text-white font-bold text-2xl">P</span>
        </div>
        <h1 class="text-2xl font-bold text-white">Crear cuenta</h1>
        <p class="text-white/50 text-sm mt-1">Únete a ProjectForge 3D</p>
      </div>

      {% if errors %}
      <div class="mb-4 px-4 py-3 rounded-xl bg-red-500/15 border border-red-500/30 text-red-300 text-sm">
        {% for field, msgs in errors.items %}{% for msg in msgs %}<p>{{ msg }}</p>{% endfor %}{% endfor %}
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-xs font-semibold text-white/60 uppercase tracking-wider block mb-2">Nombre</label>
            <input type="text" name="first_name" required
                   class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 transition-all">
          </div>
          <div>
            <label class="text-xs font-semibold text-white/60 uppercase tracking-wider block mb-2">Apellido</label>
            <input type="text" name="last_name" required
                   class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 transition-all">
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-white/60 uppercase tracking-wider block mb-2">Email</label>
          <input type="email" name="email" required
                 class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 transition-all">
        </div>
        <div>
          <label class="text-xs font-semibold text-white/60 uppercase tracking-wider block mb-2">Contraseña</label>
          <input type="password" name="password" required minlength="8"
                 class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 transition-all">
        </div>
        <div>
          <label class="text-xs font-semibold text-white/60 uppercase tracking-wider block mb-2">Confirmar Contraseña</label>
          <input type="password" name="password_confirm" required
                 class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 transition-all">
        </div>
        <button type="submit"
                class="w-full py-3 rounded-xl font-semibold text-white text-sm transition-all hover:opacity-90 mt-2"
                style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
          Crear Cuenta
        </button>
      </form>

      <p class="text-center text-sm text-white/40 mt-6">
        ¿Ya tienes cuenta?
        <a href="{% url 'login' %}" class="text-indigo-400 hover:text-indigo-300 font-medium ml-1">Inicia sesión</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
